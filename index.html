<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            background: rgba(22, 33, 62, 0.6);
            border-radius: 20px;
            padding: 24px 32px;
            box-shadow:
                0 0 60px rgba(233, 69, 96, 0.2),
                0 0 120px rgba(15, 52, 96, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f5c518, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 0 4px;
        }

        .score-box {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 10px;
            padding: 8px 18px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            min-width: 100px;
        }

        .score-box .label {
            font-size: 11px;
            color: #a0a0b0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .best-box {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 10px;
            padding: 8px 18px;
            border: 1px solid rgba(245, 197, 24, 0.3);
            min-width: 100px;
        }

        .best-box .label {
            font-size: 11px;
            color: #a0a0b0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .best-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #f5c518;
        }

        .controls-hint {
            color: #a0a0b0;
            font-size: 12px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .controls-hint kbd {
            display: inline-block;
            background: rgba(22, 33, 62, 0.9);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.4);
            border-radius: 4px;
            padding: 2px 9px;
            font-family: inherit;
            font-size: 12px;
            margin: 0 2px;
            box-shadow: 0 2px 0 rgba(233, 69, 96, 0.2);
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas {
            border-radius: 10px;
            background: rgba(13, 17, 32, 0.9);
            box-shadow:
                0 0 30px rgba(233, 69, 96, 0.1),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(15, 52, 96, 0.6);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(13, 17, 32, 0.85);
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .overlay.show {
            opacity: 1;
        }

        .overlay .game-over-text {
            font-size: 34px;
            font-weight: 900;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
            letter-spacing: 3px;
        }

        .overlay .final-score {
            font-size: 18px;
            color: #f5c518;
            margin: 8px 0;
        }

        .overlay .hint {
            font-size: 14px;
            color: #a0a0b0;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .btn-restart {
            margin-top: 14px;
            padding: 12px 40px;
            font-size: 16px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.2s;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .btn-restart.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .btn-restart:hover {
            background: linear-gradient(135deg, #ff5a75, #e94560);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">贪吃蛇</div>
        <div class="header">
            <div class="score-box">
                <div class="label">得分</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="best-box">
                <div class="label">最高分</div>
                <div class="value" id="best">0</div>
            </div>
        </div>
        <div class="controls-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向
        </div>
        <div class="canvas-wrapper">
            <canvas id="canvas" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">
                <div class="game-over-text">游戏结束</div>
                <div class="final-score" id="finalScore"></div>
                <div class="hint">按 空格键 重新开始</div>
            </div>
        </div>
        <button class="btn-restart" id="btnRestart" onclick="restart()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('finalScore');
        const btnRestart = document.getElementById('btnRestart');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let directionQueue = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('snakeBest') || '0');
        let gameLoop = null;
        let gameOver = false;
        let started = false;
        let speed = 100;
        let frame = 0;

        function init() {
            const x = Math.floor(COLS / 2);
            const y = Math.floor(ROWS / 2);
            snake = [
                { x, y },
                { x: x - 1, y },
                { x: x - 2, y }
            ];
            direction = { x: 0, y: 0 };
            directionQueue = [];
            score = 0;
            speed = 100;
            gameOver = false;
            started = false;
            frame = 0;
            scoreEl.textContent = '0';
            bestEl.textContent = best;
            overlay.classList.add('show');
            overlay.querySelector('.game-over-text').textContent = '贪吃蛇';
            overlay.querySelector('.final-score').textContent = '';
            overlay.querySelector('.hint').textContent = '按 WASD 开始游戏';
            btnRestart.classList.remove('show');
            spawnFood();
        }

        function spawnFood() {
            const empty = [];
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (!snake.some(s => s.x === x && s.y === y)) {
                        empty.push({ x, y });
                    }
                }
            }
            food = empty[Math.floor(Math.random() * empty.length)] || { x: 5, y: 5 };
        }

        function update() {
            if (gameOver || !started) return;

            if (directionQueue.length > 0) {
                const next = directionQueue.shift();
                if (next.x !== -direction.x || next.y !== -direction.y) {
                    direction = next;
                }
            }

            if (direction.x === 0 && direction.y === 0) return;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
                if (speed > 50) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            frame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID, 0);
                ctx.lineTo(x * GRID, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID);
                ctx.lineTo(canvas.width, y * GRID);
                ctx.stroke();
            }

            const pulse = Math.sin(frame * 0.15) * 0.2 + 0.8;
            const foodX = food.x * GRID + GRID / 2;
            const foodY = food.y * GRID + GRID / 2;
            const foodR = (GRID / 2 - 2) * pulse;

            ctx.save();
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 10 + pulse * 8;
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.arc(foodX, foodY, foodR, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.shadowColor = 'rgba(255,255,255,0.3)';
            ctx.shadowBlur = 3;
            const innerR = foodR * 0.4;
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.arc(foodX - 1, foodY - 1, innerR, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            snake.forEach((s, i) => {
                const cx = s.x * GRID + GRID / 2;
                const cy = s.y * GRID + GRID / 2;
                const r = GRID / 2 - 1.5;

                if (i === 0) {
                    ctx.save();
                    ctx.shadowColor = '#f5c518';
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = '#f5c518';
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    const ex1 = cx + direction.x * 6;
                    const ey1 = cy + direction.y * 6;
                    const ex2 = cx + direction.x * 4 - direction.y * 3;
                    const ey2 = cy + direction.y * 4 + direction.x * 3;
                    const ex3 = cx + direction.x * 4 + direction.y * 3;
                    const ey3 = cy + direction.y * 4 - direction.x * 3;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2);
                    ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const t = i / (snake.length + 5);
                    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                    const r1 = Math.floor(30 + (1 - t) * 70);
                    const g1 = Math.floor(180 + (1 - t) * 55);
                    const b1 = Math.floor(100 + (1 - t) * 135);
                    gradient.addColorStop(0, `rgb(${r1},${g1},${b1})`);
                    gradient.addColorStop(1, `rgb(${Math.floor(r1*0.4)},${Math.floor(g1*0.4)},${Math.floor(b1*0.4)})`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (i < snake.length - 1) {
                    const nx = snake[i + 1].x * GRID + GRID / 2;
                    const ny = snake[i + 1].y * GRID + GRID / 2;
                    const t2 = i / (snake.length + 5);
                    const r2 = Math.floor(30 + (1 - t2) * 70);
                    const g2 = Math.floor(180 + (1 - t2) * 55);
                    const b2 = Math.floor(100 + (1 - t2) * 135);
                    ctx.strokeStyle = `rgb(${r2},${g2},${b2})`;
                    ctx.lineWidth = GRID - 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(nx, ny);
                    ctx.stroke();
                }
            });

            if (snake.length > 1) {
                const last = snake[snake.length - 1];
                const lx = last.x * GRID + GRID / 2;
                const ly = last.y * GRID + GRID / 2;
                const tLast = (snake.length - 1) / (snake.length + 5);
                const rL = Math.floor(30 + (1 - tLast) * 70);
                const gL = Math.floor(180 + (1 - tLast) * 55);
                const bL = Math.floor(100 + (1 - tLast) * 135);
                const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, GRID / 2 - 1.5);
                grad.addColorStop(0, `rgb(${rL},${gL},${bL})`);
                grad.addColorStop(1, `rgba(${Math.floor(rL*0.3)},${Math.floor(gL*0.3)},${Math.floor(bL*0.3)},0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(lx, ly, GRID / 2 - 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                localStorage.setItem('snakeBest', best);
            }
            overlay.querySelector('.game-over-text').textContent = '游戏结束';
            finalScoreEl.textContent = '最终得分: ' + score;
            overlay.querySelector('.hint').textContent = '按 空格键 重新开始';
            overlay.classList.add('show');
            btnRestart.classList.add('show');
        }

        function restart() {
            clearInterval(gameLoop);
            init();
            draw();
            gameLoop = setInterval(tick, speed);
        }

        function tick() {
            update();
            draw();
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === ' ' || key === 'space') {
                e.preventDefault();
                if (gameOver) {
                    restart();
                }
                return;
            }

            if (gameOver) return;

            let newDir = null;

            switch (key) {
                case 'w':
                    newDir = { x: 0, y: -1 };
                    break;
                case 's':
                    newDir = { x: 0, y: 1 };
                    break;
                case 'a':
                    newDir = { x: -1, y: 0 };
                    break;
                case 'd':
                    newDir = { x: 1, y: 0 };
                    break;
            }

            if (newDir) {
                if (!started) {
                    started = true;
                    direction = newDir;
                    directionQueue = [newDir];
                    overlay.classList.remove('show');
                    return;
                }
                const lastDir = directionQueue.length > 0
                    ? directionQueue[directionQueue.length - 1]
                    : direction;
                if (newDir.x !== -lastDir.x || newDir.y !== -lastDir.y) {
                    directionQueue.push(newDir);
                    if (directionQueue.length > 3) {
                        directionQueue.shift();
                    }
                }
            }
        });

        init();
        draw();
        gameLoop = setInterval(tick, speed);
    </script>
</body>
</html>
