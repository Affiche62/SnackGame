<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .score {
            color: #e94560;
            font-size: 22px;
            font-weight: bold;
        }

        .score span {
            color: #fff;
        }

        .best {
            color: #0f3460;
            font-size: 18px;
            color: #a0a0b0;
        }

        .best span {
            color: #f5c518;
        }

        .controls-hint {
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .controls-hint kbd {
            display: inline-block;
            background: #16213e;
            color: #e94560;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 2px 8px;
            font-family: inherit;
            font-size: 13px;
            margin: 0 2px;
        }

        canvas {
            border: 2px solid #0f3460;
            border-radius: 6px;
            background: #16213e;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.15);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.6);
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .overlay small {
            display: block;
            font-size: 16px;
            color: #a0a0b0;
            font-weight: normal;
            margin-top: 8px;
            text-shadow: none;
        }

        .btn-restart {
            margin-top: 12px;
            padding: 10px 36px;
            font-size: 16px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            display: none;
        }

        .btn-restart.show {
            display: inline-block;
        }

        .btn-restart:hover {
            background: #c73a54;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="best">最高分: <span id="best">0</span></div>
        </div>
        <div class="controls-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向
        </div>
        <div style="position: relative; display: inline-block;">
            <canvas id="canvas" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">游戏结束<small>按 空格键 重新开始</small></div>
        </div>
        <button class="btn-restart" id="btnRestart" onclick="restart()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const btnRestart = document.getElementById('btnRestart');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let best = parseInt(localStorage.getItem('snakeBest') || '0');
        let gameLoop = null;
        let gameOver = false;
        let speed = 100;

        function init() {
            const x = Math.floor(COLS / 2);
            const y = Math.floor(ROWS / 2);
            snake = [
                { x, y },
                { x: x - 1, y },
                { x: x - 2, y }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 100;
            gameOver = false;
            scoreEl.textContent = '0';
            bestEl.textContent = best;
            overlay.classList.remove('show');
            btnRestart.classList.remove('show');
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function update() {
            if (gameOver) return;

            direction = { ...nextDirection };

            if (direction.x === 0 && direction.y === 0) return;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
                if (speed > 50) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e94560';
            ctx.fillRect(food.x * GRID + 1, food.y * GRID + 1, GRID - 2, GRID - 2);

            snake.forEach((s, i) => {
                if (i === 0) {
                    ctx.fillStyle = '#f5c518';
                    ctx.shadowColor = '#f5c518';
                    ctx.shadowBlur = 6;
                } else {
                    const t = 1 - i / (snake.length + 10);
                    const r = Math.floor(21 + t * 30);
                    const g = Math.floor(83 + t * 60);
                    const b = Math.floor(49 + t * 80);
                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
            });
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameLoop);
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                localStorage.setItem('snakeBest', best);
            }
            overlay.classList.add('show');
            btnRestart.classList.add('show');
        }

        function restart() {
            clearInterval(gameLoop);
            init();
            draw();
            gameLoop = setInterval(() => {
                update();
                draw();
            }, speed);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === ' ' || key === 'space') {
                e.preventDefault();
                if (gameOver) {
                    restart();
                }
                return;
            }

            if (gameOver) return;

            switch (key) {
                case 'w':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 's':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'a':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'd':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        init();
        draw();
        gameLoop = setInterval(() => {
            update();
            draw();
        }, speed);
    </script>
</body>
</html>
